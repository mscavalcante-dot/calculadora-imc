<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="custom.css">
    <script src="calculo.js" defer></script>
</head>
<body>
  <div class="container">
    <label for="peso">Peso(kg):</label>
    <input type="number" id="peso">

    <label for="altura">Altura(m):</label>
    <input type="number" id="altura">

    <button onclick="calcularIMC()">Calcular</button>

    <p id="resultado"></p>
    <p id="ideal"></p>
  </div>
  <div class="footer">
    <p>Nota: o cálculo de IMC não leva em consideração a composição corporal. Por esse motivo, pessoas com muita massa muscular, como é o caso de alguns atletas, podem apresentar um IMC acima do normal. O ideal é consultar um nutricionista para fazer uma avaliação mais detalhada.</p>
  </div>
</body>
</body>
</html>
